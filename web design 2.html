<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            margin-bottom: 15px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .gallery-description {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            margin-bottom: 50px;
            font-size: 1.1rem;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            aspect-ratio: 1;
        }

        .gallery-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .gallery-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .overlay-text {
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .gallery-item:nth-child(1) img {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .gallery-item:nth-child(2) img {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .gallery-item:nth-child(3) img {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .gallery-item:nth-child(4) img {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .gallery-item:nth-child(5) img {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .gallery-item:nth-child(6) img {
            background: linear-gradient(135deg, #30cfd0 0%, #330867 100%);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 20px;
            }

            body {
                padding: 20px 10px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }

            .gallery {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
                gap: 15px;
            }

            .overlay-text {
                font-size: 0.9rem;
            }
        }

        footer {
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>✨ My Photo Gallery ✨</h1>
        <p class="gallery-description">Hover over images to see the beautiful effects</p>

        <div class="gallery">
            <!-- Gallery Item 1 -->
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=500&h=500&fit=crop" alt="Mountain Landscape">
                <div class="gallery-overlay">
                    <div class="overlay-text">Mountain View</div>
                </div>
            </div>

            <!-- Gallery Item 2 -->
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1501594907352-04cda38ebc29?w=500&h=500&fit=crop" alt="Ocean Waves">
                <div class="gallery-overlay">
                    <div class="overlay-text">Ocean Waves</div>
                </div>
            </div>

            <!-- Gallery Item 3 -->
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=500&h=500&fit=crop" alt="Beach Sunset">
                <div class="gallery-overlay">
                    <div class="overlay-text">Beach Sunset</div>
                </div>
            </div>

            <!-- Gallery Item 4 -->
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1495567720989-cebfdd97913b?w=500&h=500&fit=crop" alt="Forest Trail">
                <div class="gallery-overlay">
                    <div class="overlay-text">Forest Trail</div>
                </div>
            </div>

            <!-- Gallery Item 5 -->
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=500&h=500&fit=crop" alt="Sky View">
                <div class="gallery-overlay">
                    <div class="overlay-text">Sky View</div>
                </div>
            </div>

            <!-- Gallery Item 6 -->
            <div class="gallery-item">
                <img src="https://images.unsplash.com/photo-1511707267537-b85faf00021e?w=500&h=500&fit=crop" alt="Urban Architecture">
                <div class="gallery-overlay">
                    <div class="overlay-text">Architecture</div>
                </div>
            </div>
        </div>

        <footer>
            <p>&copy; 2026 Photo Gallery. All rights reserved.</p>
        </footer>
    </div>
</body>
</html>
